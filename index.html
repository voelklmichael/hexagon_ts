<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hexagon Puzzle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
    }

    #hand-panel {
      width: 200px;
      flex-shrink: 0;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
    }

    .hand-slot {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-bottom: 1px solid #0f3460;
    }
    .hand-slot:last-child { border-bottom: none; }

    .tile-canvas {
      flex: 1;
      width: 100%;
      min-height: 0;
    }

    .tile-controls {
      display: flex;
      gap: 6px;
      padding: 8px;
      width: 100%;
      justify-content: center;
    }

    .tile-controls button {
      background: #16213e;
      color: #a0b8d0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.15s, color 0.15s;
    }
    .tile-controls button:hover { background: #1f4080; color: #fff; }

    .btn-select {
      color: #e94560 !important;
      border-color: #e94560 !important;
    }
    .btn-select:hover { background: #e94560 !important; color: #fff !important; }

    .btn-play {
      color: #00e676 !important;
      border-color: #00e676 !important;
    }
    .btn-play:hover { background: #00e676 !important; color: #1a1a2e !important; }

    #board-panel { flex: 1; position: relative; }
    #board-panel canvas { display: block; width: 100%; height: 100%; }

    #game-over {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #game-over.visible { display: flex; }
    .game-over-box {
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 12px;
      padding: 48px 56px;
      text-align: center;
      color: #fff;
    }
    .game-over-box h2 { font-size: 2rem; margin-bottom: 24px; letter-spacing: 2px; }
    .game-over-box button {
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 28px;
      font-size: 1rem;
      cursor: pointer;
    }
    .game-over-box button:hover { background: #ff6b8a; }
  </style>
</head>
<body>
  <div id="hand-panel"></div>
  <div id="board-panel">
    <canvas id="game"></canvas>
    <div id="game-over">
      <div class="game-over-box">
        <h2>Game Over</h2>
        <button id="restart-btn">Restart</button>
      </div>
    </div>
  </div>
  <script type="module" src="dist/main.js"></script>
</body>
</html>
