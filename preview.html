<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Board Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
      color: #a0b8d0;
      font-size: 12px;
    }

    /* ── Left panel ── */
    #left-panel {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
    }

    #panel-header {
      padding: 12px 14px;
      border-bottom: 1px solid #0f3460;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #5a7a9a;
    }

    #options-form {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #5a7a9a;
    }

    input[type="number"],
    select {
      background: #16213e;
      color: #a0b8d0;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 12px;
      width: 100%;
    }

    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: #4a80c0;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-row input {
      cursor: pointer;
      accent-color: #53d8fb;
    }

    #seed-row {
      display: flex;
      gap: 6px;
    }

    #seed-row input {
      flex: 1;
    }

    #randomise-btn {
      background: #16213e;
      color: #5a7a9a;
      border: 1px solid #0f3460;
      border-radius: 4px;
      padding: 5px 8px;
      cursor: pointer;
      font-size: 11px;
      white-space: nowrap;
    }

    #randomise-btn:hover {
      background: #1f4080;
      color: #fff;
    }

    #error-msg {
      color: #e94560;
      font-size: 11px;
      min-height: 16px;
    }

    #render-btn {
      width: 100%;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 9px 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    #render-btn:hover {
      background: #ff6b8a;
    }

    #undo-redo-row {
      display: flex;
      gap: 6px;
    }

    #undo-redo-row button {
      flex: 1;
      background: #16213e;
      color: #a0b8d0;
      border: 1px solid #0f3460;
      border-radius: 5px;
      padding: 7px 0;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #undo-redo-row button:hover:not(:disabled) {
      background: #1f4080;
      color: #fff;
    }

    #undo-redo-row button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* ── Mid panel ── */
    #mid-panel {
      width: 190px;
      flex-shrink: 0;
      border-right: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .mid-section-header {
      padding: 8px 12px;
      border-bottom: 1px solid #0f3460;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #5a7a9a;
      flex-shrink: 0;
    }

    #player-status-list {
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    .player-status-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      padding: 3px 5px;
      border-radius: 4px;
    }

    .player-status-row.current {
      background: #1a2a4a;
    }

    .player-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .player-label {
      flex: 1;
    }

    .player-dead {
      opacity: 0.4;
      text-decoration: line-through;
    }

    .current-badge {
      font-size: 9px;
      color: #53d8fb;
      letter-spacing: 0.5px;
    }

    #tile-grid {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tile-card {
      cursor: pointer;
      border-radius: 6px;
      border: 2px solid #1a3a60;
      background: #0d1b35;
      padding: 4px;
      display: flex;
      justify-content: center;
      transition: border-color 0.12s;
    }

    .tile-card:hover {
      border-color: #3a6a9a;
    }

    .tile-card.selected {
      border-color: #53d8fb;
      background: #0e2040;
    }

    .tile-card canvas {
      display: block;
    }

    #play-area {
      padding: 10px;
      border-top: 1px solid #0f3460;
      flex-shrink: 0;
    }

    #play-btn {
      width: 100%;
      background: #53d8fb;
      color: #0a0f1e;
      border: none;
      border-radius: 5px;
      padding: 8px 0;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.12s, opacity 0.12s;
    }

    #play-btn:hover:not(:disabled) {
      background: #7ae8ff;
    }

    #play-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #game-status {
      margin-top: 7px;
      font-size: 10px;
      color: #5a7a9a;
      text-align: center;
      min-height: 14px;
    }

    /* ── Right panel ── */
    #right-panel {
      flex: 1;
      position: relative;
    }

    #preview-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #empty-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2a3a5a;
      font-size: 13px;
      pointer-events: none;
    }

    /* ── JSON panel ── */
    #json-panel {
      width: 300px;
      flex-shrink: 0;
      border-left: 1px solid #0f3460;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #json-panel-header {
      padding: 8px 12px;
      border-bottom: 1px solid #0f3460;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #5a7a9a;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #json-copy-btn {
      background: #16213e;
      color: #5a7a9a;
      border: 1px solid #0f3460;
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 10px;
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
    }

    #json-copy-btn:hover {
      background: #1f4080;
      color: #fff;
    }

    #json-output {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      margin: 0;
      font-family: monospace;
      font-size: 10px;
      line-height: 1.5;
      color: #7ab8d8;
      white-space: pre;
      background: transparent;
    }
  </style>
</head>

<body>
  <div id="left-panel">
    <div id="panel-header">Game Options</div>
    <form id="options-form">

      <div class="field">
        <label for="playerCount">Players</label>
        <input type="number" id="playerCount" name="playerCount" value="2" min="1" max="6" />
      </div>

      <div class="field">
        <label for="boardSize">Board Size (radius)</label>
        <input type="number" id="boardSize" name="boardSize" value="3" min="1" max="10" />
      </div>

      <div class="field">
        <label for="handSize">Hand Size</label>
        <input type="number" id="handSize" name="handSize" value="3" min="1" max="5" />
      </div>

      <div class="field">
        <label for="collisionMode">Collision</label>
        <select id="collisionMode" name="collisionMode">
          <option value="pass">Pass through</option>
          <option value="die">Both die</option>
        </select>
      </div>

      <div class="field">
        <label for="winningCondition">Winning Condition</label>
        <select id="winningCondition" name="winningCondition">
          <option value="LastManStanding">Last Man Standing</option>
          <option value="MaxDistance">Max Distance</option>
          <option value="MaxVelocity">Max Velocity</option>
        </select>
      </div>

      <div class="field">
        <label for="outerConnectors">Outer Connectors</label>
        <select id="outerConnectors" name="outerConnectors">
          <option value="All">All</option>
          <option value="Reduced">Reduced</option>
        </select>
      </div>

      <div class="field">
        <label class="checkbox-row">
          <input type="checkbox" name="highlightDeadPaths" checked />
          Highlight dead paths
        </label>
      </div>

      <div class="field">
        <label class="checkbox-row">
          <input type="checkbox" name="previewMoves" checked />
          Preview moves
        </label>
      </div>

      <div class="field">
        <label>Seed</label>
        <div id="seed-row">
          <input type="number" id="seed-input" placeholder="random" />
          <button type="button" id="randomise-btn">&#x21BA;</button>
        </div>
      </div>

      <div id="error-msg"></div>
      <button type="button" id="render-btn">Render</button>
      <div id="undo-redo-row">
        <button type="button" id="undo-btn" disabled>&#8592; Undo</button>
        <button type="button" id="redo-btn" disabled>Redo &#8594;</button>
      </div>

    </form>
  </div>

  <div id="mid-panel">
    <div class="mid-section-header">Players</div>
    <div id="player-status-list"></div>
    <div class="mid-section-header">Hand</div>
    <div id="tile-grid"></div>
    <div id="play-area">
      <button id="play-btn" disabled>Play Tile</button>
      <div id="game-status"></div>
    </div>
  </div>

  <div id="right-panel">
    <canvas id="preview-canvas"></canvas>
    <div id="empty-hint">Configure options and click Render</div>
  </div>

  <div id="json-panel">
    <div id="json-panel-header">
      <span>State (JSON)</span>
      <button id="json-copy-btn">Copy</button>
    </div>
    <pre id="json-output"></pre>
  </div>

  <script type="module" src="dist/preview.js"></script>
  <script>
    document.getElementById("randomise-btn").addEventListener("click", () => {
      document.getElementById("seed-input").value = "";
    });
  </script>
</body>

</html>
